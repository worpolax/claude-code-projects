function shopCost(item){ const l=shopLvl[item.id]||0; return l>=item.maxLvl?null:Math.floor(item.base*Math.pow(1.6,l)); }
function applyShop(p){
  SHOP.forEach(item=>{ const l=shopLvl[item.id]||0; if(l>0) item.fn(p,l); });
  SPECIAL_SHOP.forEach(item=>{ const l=shopLvl[item.id]||0; if(l>0) item.fn(p,l); });
}

// ── AUDIO ────────────────────────────────────────────────────────
let audioCtx=null;
function initAudio(){ if(!audioCtx) audioCtx=new(AudioContext||webkitAudioContext)(); }
function beep(freq,dur,type='square',vol=.15,fe=null){
  if(!audioCtx)return; const v=vol*(cfg.volume/100); if(v<=.001)return;
  try{
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.type=type; o.frequency.setValueAtTime(freq,audioCtx.currentTime);
    if(fe) o.frequency.exponentialRampToValueAtTime(fe,audioCtx.currentTime+dur);
    g.gain.setValueAtTime(Math.max(.001,v),audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+dur);
    o.start(); o.stop(audioCtx.currentTime+dur);
  }catch(e){}
}

function sndHurt()   { beep(160,.25,'square',.28,80); }
function sndDie()    { beep(200,.6,'sawtooth',.32,40); }
function sndLevel()  { [523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,.12,'square',.18),i*110)); }
function sndPickup() { beep(880,.1,'sine',.1,1100); }
function sndCoin()   { beep(1300,.05,'sine',.07,1600); }
function sndExplo()  { beep(80,.4,'sawtooth',.28,30); }
function sndMenu()   { beep(440,.07,'square',.08); }

function sndBoost()  { [1047,1319,1568].forEach((f,i)=>setTimeout(()=>beep(f,.1,'sine',.18),i*80)); }

// ── SAVE SYSTEM ──────────────────────────────────────────────────
const SKEY=i=>`harlow_s${i}`;
let saves=[null,null,null]; let curSlot=-1;
function loadAllSaves(){ for(let i=0;i<3;i++){ try{ saves[i]=JSON.parse(localStorage.getItem(SKEY(i))); }catch(e){ saves[i]=null; } } }
function writeSave(slot){ saves[slot]={player:{...player},waveN,waveTimer,ts:Date.now()}; localStorage.setItem(SKEY(slot),JSON.stringify(saves[slot])); }
function delSave(slot){ saves[slot]=null; localStorage.removeItem(SKEY(slot)); }
function applyLoad(slot){ if(!saves[slot])return false; player={...makePlayer(),...saves[slot].player}; curSlot=slot; resetWorld(); if(saves[slot].waveN){ waveN=saves[slot].waveN; waveTimer=saves[slot].waveTimer??45; updateWaveParams(); } return true; }
let hiScore=+(localStorage.getItem('harlow_hi')||0);
function checkHi(){ if(player.score>hiScore){ hiScore=player.score; localStorage.setItem('harlow_hi',hiScore); } }

// ── INPUT ────────────────────────────────────────────────────────
const keys={};
const mouse={x:0,y:0,down:false};
let shootAngle=0;
document.addEventListener('keydown',e=>{ if(!keys[e.code])onKeyPress(e.code); keys[e.code]=true; initAudio(); });
document.addEventListener('keyup',  e=>{ keys[e.code]=false; });
document.addEventListener('mousemove',e=>{ mouse.x=e.clientX; mouse.y=e.clientY; shootAngle=Math.atan2(e.clientY-canvas.height/2,e.clientX-canvas.width/2); });
document.addEventListener('mousedown',e=>{ mouse.down=true; initAudio(); if(state===S.GAMEOVER){state=S.MENU;mainSel=0;} if(state===S.MENU)checkUpdatesClick(e.clientX,e.clientY); });

// ── MENU VARS ────────────────────────────────────────────────────
let mainSel=0,loadSel=0,pauseSel=0,upgSel=0,saveSel=0,shopSel=0,optSel=0;
let upgOpts=[]; let updatesScroll=0;
const UPDATES_BTN=()=>({x:canvas.width-220,y:canvas.height-50,w:210,h:36});
function checkUpdatesClick(mx,my){ const b=UPDATES_BTN(); if(mx>=b.x&&mx<=b.x+b.w&&my>=b.y&&my<=b.y+b.h){state=S.UPDATES;updatesScroll=0;} }

function navUD(sel,max,code){ return code==='ArrowDown'?Math.min(max,sel+1):code==='ArrowUp'?Math.max(0,sel-1):sel; }

function onKeyPress(code){
  // No sound for WASD movement during gameplay
  const movementKey=code==='KeyW'||code==='KeyA'||code==='KeyS'||code==='KeyD';
  if(!(state===S.PLAYING&&movementKey)) sndMenu();

  switch(state){
    case S.MENU:
      if(code==='ArrowUp'||code==='ArrowDown') mainSel=navUD(mainSel,4,code);
      if(code==='Enter') handleMenuEnter();
      if(code==='KeyU'){state=S.UPDATES;updatesScroll=0;}
      break;
    case S.LOAD:
      if(code==='ArrowUp'||code==='ArrowDown') loadSel=navUD(loadSel,2,code);
      if(code==='Escape') state=S.MENU;
      if(code==='Enter'&&saves[loadSel]){applyLoad(loadSel);state=S.PLAYING;}
      break;
    case S.PLAYING:
      if(code==='Escape'){state=S.PAUSED;pauseSel=0;}
      break;
    case S.PAUSED:
      if(code==='Escape') state=S.PLAYING;
      if(code==='ArrowUp'||code==='ArrowDown') pauseSel=navUD(pauseSel,2,code);
      if(code==='Enter'){
        if(pauseSel===0) state=S.PLAYING;
        else if(pauseSel===1){state=S.SAVESLOT;saveSel=0;}
        else{state=S.MENU;mainSel=0;}
      }
      break;
    case S.SAVESLOT:
      if(code==='Escape') state=S.PAUSED;
      if(code==='ArrowUp'||code==='ArrowDown') saveSel=navUD(saveSel,2,code);
      if(code==='Enter'){writeSave(saveSel);curSlot=saveSel;loadAllSaves();state=S.PAUSED;}
      break;
    case S.UPGRADE:
      if(code==='ArrowLeft')  upgSel=Math.max(0,upgSel-1);
      if(code==='ArrowRight') upgSel=Math.min(upgOpts.length-1,upgSel+1);
      if(code==='Enter')  pickUpgrade(upgSel);
      if(code==='Digit1') pickUpgrade(0);
      if(code==='Digit2') pickUpgrade(1);
      if(code==='Digit3'&&upgOpts.length>2) pickUpgrade(2);
      break;
    case S.GAMEOVER:
      if(code==='Enter'){state=S.MENU;mainSel=0;}
      break;
    case S.SHOP:
      if(code==='Escape'){state=S.MENU;mainSel=0;}
      if(code==='KeyQ'||code==='BracketLeft'){shopTab=0;shopSel=0;}
      if(code==='KeyE'||code==='BracketRight'){shopTab=1;shopSel=0;}
      if(shopTab===0){
        if(code==='ArrowLeft')  shopSel=Math.max(0,shopSel-1);
        if(code==='ArrowRight') shopSel=Math.min(SHOP.length-1,shopSel+1);
        if(code==='ArrowUp')    shopSel=Math.max(0,shopSel-3);
        if(code==='ArrowDown')  shopSel=Math.min(SHOP.length-1,shopSel+3);
      } else {
        if(code==='ArrowLeft'||code==='ArrowUp')    shopSel=Math.max(0,shopSel-1);
        if(code==='ArrowRight'||code==='ArrowDown') shopSel=Math.min(SPECIAL_SHOP.length-1,shopSel+1);
      }
      if(code==='Enter') tryBuyShop(shopSel);
      break;
    case S.OPTIONS:
      if(code==='Escape'){saveCfg();state=S.MENU;mainSel=0;}
      if(code==='ArrowUp'||code==='ArrowDown') optSel=navUD(optSel,3,code);
      handleOptInput(code);
      break;
    case S.UPDATES:
      if(code==='Escape'||code==='Enter'||code==='KeyU') state=S.MENU;
      if(code==='ArrowDown') updatesScroll=Math.min(updatesScroll+30,9999);
      if(code==='ArrowUp')   updatesScroll=Math.max(0,updatesScroll-30);
      break;
  }
}
function handleMenuEnter(){
  if(mainSel===0) startNew();
  else if(mainSel===1){loadAllSaves();state=S.LOAD;loadSel=0;}
  else if(mainSel===2){state=S.SHOP;shopSel=0;}
  else if(mainSel===3){state=S.OPTIONS;optSel=0;}
}
function handleOptInput(code){
  const lr=code==='ArrowLeft'?-1:code==='ArrowRight'?1:0;
  if(lr===0&&code!=='Enter')return;
  switch(optSel){
    case 0:{const d=['easy','normal','hard'];cfg.difficulty=d[(d.indexOf(cfg.difficulty)+1)%3];break;}
    case 1:cfg.screenShake=!cfg.screenShake;break;
    case 2:cfg.volume=Math.min(100,Math.max(0,cfg.volume+(lr||10)));break;
    case 3:cfg.showDmgNums=!cfg.showDmgNums;break;
  }
}

// ── WAVE PARAMS ──────────────────────────────────────────────────
function updateWaveParams(){
  const mobsThisWave = 8 + waveN * 3;
  const baseRate = Math.floor(45000 / mobsThisWave);
  const waveScale = Math.pow(0.95, waveN - 1);
  spawnRate = Math.max(500, Math.floor(baseRate * 0.95 * waveScale));
  maxMons   = Math.min(45, 10 + waveN * 2);
  waveMult  = 1 + waveN * 0.10;
}

// ── INIT ─────────────────────────────────────────────────────────
function resetWorld(){
  monsters=[]; bullets=[]; eBullets=[]; particles=[]; pickups=[]; worldCoins=[]; boostPickups=[]; dmgNums=[];
  hurtFlash=0; hurtCool=0; spawnTimer=0;
  waveN=1; waveTimer=45; combo=0; comboT=0; waveMsg=null;
  cam.x=player.x-canvas.width/2; cam.y=player.y-canvas.height/2;
  rockets=[];
  player.rocketTimer=player.rocketInterval||5;
  player.cloakTimer=player.cloakInterval||30;
  player.gauntletTimer=player.gauntletInterval||20;
  player.frozenMons=false; player.frozenTimer=0;
  updateWaveParams();
}
function startNew(){ player=makePlayer(); applyShop(player); curSlot=-1; resetWorld(); state=S.PLAYING; }
function tryBuyShop(idx){
  if(shopTab===0){
    const item=SHOP[idx],cost=shopCost(item);
    if(cost===null||!spendCoins(cost))return;
    shopLvl[item.id]=(shopLvl[item.id]||0)+1; saveShop(); sndLevel();
  } else {
    const item=SPECIAL_SHOP[idx],cost=specialCost(item);
    if(!item||cost===null||!spendCoins(cost))return;
    shopLvl[item.id]=(shopLvl[item.id]||0)+1; saveShop(); sndLevel();
  }
}

// ═══════════════════════════════════════════════════════════════
//  VFX
// ═══════════════════════════════════════════════════════════════
function spawnParts(x,y,col,n=8,spd=3){
  // Performance: cap total particles
  if(particles.length>80)return;
  for(let i=0;i<n;i++){
    const a=(Math.PI*2/n)*i+Math.random()*.6,s=.5+Math.random()*spd;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,decay:.025+Math.random()*.04,sz:2+Math.random()*4,col});
  }
}

function spawnCoin(x,y,val){

function tickCoins(dt){
  const magnetRange = player.magnetActive>0 ? 9999 : 140;
  const magnetForce = player.magnetActive>0 ? 12 : 4;
  for(let i=worldCoins.length-1;i>=0;i--){
    const c=worldCoins[i]; c.x+=c.vx; c.y+=c.vy; c.vx*=.93; c.vy*=.93;

    const dx=player.x-c.x,dy=player.y-c.y,d=Math.hypot(dx,dy)||1;

    if(d<20){earnCoins(c.val);player.sessionCoins=(player.sessionCoins||0)+c.val;sndCoin();worldCoins.splice(i,1);}

}

function spawnEliteBoost(x,y){

  let type;

  if(r<.05)      type='bomb';

function applyBoost(type){

      break;

      player.boostRegenTimer=5; sndBoost(); waveMsg={text:'💉  RAPID REGEN!',life:2};

      player.hp=Math.min(player.maxHP,player.hp+30); spawnGreen(player.x,player.y); sndPickup();

function tickRocket(dt){
  if(!player.rocketUnlocked)return;
  player.rocketTimer-=dt;
  if(player.rocketTimer>0)return;
  player.rocketTimer=player.rocketInterval;
  let nearest=null,nearDist=Infinity;
  monsters.forEach(m=>{ if(m.dead)return; const d=Math.hypot(m.x-player.x,m.y-player.y); if(d<nearDist){nearDist=d;nearest=m;} });
  if(!nearest)return;
  const dx=nearest.x-player.x,dy=nearest.y-player.y,d=Math.hypot(dx,dy)||1;
  rockets.push({x:player.x,y:player.y,vx:(dx/d)*9,vy:(dy/d)*9,target:nearest,life:3});
  sndExplo();
}
function tickRockets(dt){
  for(let i=rockets.length-1;i>=0;i--){
    const r=rockets[i];
    if(r.target&&!r.target.dead){
      const dx=r.target.x-r.x,dy=r.target.y-r.y,d=Math.hypot(dx,dy)||1;
      r.vx+=(dx/d)*0.8; r.vy+=(dy/d)*0.8;
      const spd=Math.hypot(r.vx,r.vy);
      if(spd>11){r.vx=r.vx/spd*11;r.vy=r.vy/spd*11;}
    }
    r.x+=r.vx; r.y+=r.vy; r.life-=dt;
    const distToTarget=r.target?Math.hypot(r.x-r.target.x,r.y-r.target.y):0;
    if(r.life<=0||distToTarget<18){
      spawnExplo(r.x,r.y); sndExplo();
      const AOE=100,dmg=player.dmg*4;
      for(let mi=monsters.length-1;mi>=0;mi--){
        const m=monsters[mi]; if(m.dead)continue;
        if(Math.hypot(m.x-r.x,m.y-r.y)<AOE){ m.hp-=dmg; m.hitFlash=1; if(m.hp<=0&&!m.dead)killMonster(mi); }
      }
      rockets.splice(i,1);
    }
  }
}
function drawRockets(){
  const t=Date.now()*.001;
  rockets.forEach(r=>{
    const sx=r.x-cam.x,sy=r.y-cam.y;
    ctx.save();
    ctx.shadowColor='#FF6D00'; ctx.shadowBlur=12;
    ctx.fillStyle='#FF9800';
    ctx.beginPath(); ctx.arc(sx,sy,5,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(255,150,0,0.5)';
    ctx.beginPath(); ctx.arc(sx,sy,8+Math.sin(t*20)*2,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0; ctx.restore();
  });
}

    if(player.cloakActive<=0){player.cloakActive=0;waveMsg={text:'🌀  CLOAK FADED',life:1.5};}

function tickPlayerTimers(dt){
  if(player.shield>0){
    player.shieldTimer-=dt;
    if(player.shieldTimer<=0){player.shield=0;player.shieldTimer=0;}

  if(player.boostRegenTimer>0){

    player.hp=Math.min(player.maxHP,player.hp+20*dt);
    if(player.boostRegenTimer<0)player.boostRegenTimer=0;
  }
  if(player.magnetActive>0) player.magnetActive-=dt;
}

function drawSpider(s,wa){
  const bob=Math.sin(wa*2),lp=Math.sin(wa);
  ctx.fillStyle='#1A0030'; ctx.beginPath(); ctx.ellipse(0,s*.3+bob,s*.44,s*.34,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#2D0050'; ctx.beginPath(); ctx.ellipse(0,-s*.18+bob,s*.55,s*.42,0,0,Math.PI*2); ctx.fill();
  ctx.shadowColor='#FF1744'; ctx.shadowBlur=8;
  ctx.fillStyle='#FF1744';
  [[-s*.28,-s*.33],[-s*.08,-s*.42],[s*.08,-s*.42],[s*.28,-s*.33]].forEach(([ex,ey])=>{
    ctx.beginPath(); ctx.arc(ex,ey+bob,s*.1,0,Math.PI*2); ctx.fill();
  });
  ctx.shadowBlur=0;
  ctx.strokeStyle='#3D0070'; ctx.lineWidth=2.5;
  for(let i=0;i<4;i++){
    const side=i<2?-1:1,yo=i%2===0?-.1:.1;
    const lx=side*s*.4,ly=bob+yo*s;
    const ang=(i%2===0?-.5:.3)*Math.PI+(lp*.25*(i%2===0?1:-1));
    ctx.beginPath(); ctx.moveTo(lx,ly); ctx.lineTo(lx+Math.cos(ang)*s*.9,ly+Math.sin(ang)*s*.5); ctx.stroke();
  }
}
function drawEnderman(s,te){
  ctx.fillStyle='#0D0D0D';
  ctx.fillRect(-s*.26,0,s*.22,s*.85); ctx.fillRect(s*.04,0,s*.22,s*.85);
  ctx.fillRect(-s*.3,-s*2.5,s*.6,s*2.55);
  ctx.fillRect(-s*.88,-s*2.3,s*.56,s*.18); ctx.fillRect(s*.32,-s*2.3,s*.56,s*.18);
  ctx.fillStyle='#111111'; ctx.fillRect(-s*.42,-s*3.25,s*.84,s*.82);
  ctx.shadowColor='#E040FB'; ctx.shadowBlur=16;
  ctx.fillStyle='#E040FB';
  ctx.fillRect(-s*.32,-s*3.08,s*.22,s*.18); ctx.fillRect(s*.1,-s*3.08,s*.22,s*.18);
  ctx.shadowBlur=0;
  if(te>0){ctx.fillStyle=`rgba(224,64,251,${te*.45})`;ctx.fillRect(-s*.5,-s*3.35,s,s*4.25);}
}
function drawBlaze(s){
  const t=Date.now()*.002;
  for(let layer=0;layer<2;layer++){
    ctx.save(); ctx.rotate(t*(layer===0?1:-.6));
    for(let i=0;i<4;i++){
      const a=(Math.PI*2/4)*i+(layer*Math.PI/4);
      ctx.fillStyle=layer===0?'#40C4FF':'#FFFFFF';
      ctx.shadowColor=layer===0?'#40C4FF':'#B3E5FC'; ctx.shadowBlur=layer===0?12:6;
      ctx.fillRect(Math.cos(a)*s*.58-s*(layer===0?.12:.09),Math.sin(a)*s*.58-s*(layer===0?.5:.4),s*(layer===0?.24:.18),s*(layer===0?1:.8));
    }
    ctx.shadowBlur=0; ctx.restore();
  }
  ctx.shadowColor='#40C4FF'; ctx.shadowBlur=18;
  ctx.fillStyle='#0288D1'; ctx.beginPath(); ctx.arc(0,0,s*.42,0,Math.PI*2); ctx.fill();
  ctx.shadowBlur=8;
  ctx.fillStyle='#FFFFFF'; ctx.beginPath(); ctx.arc(0,0,s*.22,0,Math.PI*2); ctx.fill();
  ctx.shadowBlur=0;
  ctx.fillStyle='#01579B'; ctx.fillRect(-s*.22,-s*.1,s*.1,s*.1); ctx.fillRect(s*.12,-s*.1,s*.1,s*.1);
}

function drawMonster(m,sx,sy){
  // Performance: only shadow elite monsters when count is low
  const useShadow = m.isElite && monsters.length < 22;
  ctx.save(); ctx.translate(sx,sy);
  if(useShadow){ctx.shadowColor='#FFD700';ctx.shadowBlur=20+Math.sin(Date.now()*.005)*6;}
  if(m.hitFlash>0) ctx.filter=`brightness(${1+m.hitFlash*8})`;
  if(m.vx<0) ctx.scale(-1,1);
  const s=m.sz,wa=m.walkA||0;
  switch(m.type){
    case 'zombie':   drawZombie(s,wa);          break;
    case 'skeleton': drawSkeleton(s,wa);         break;
    case 'creeper':  drawCreeper(s,m.explT);     break;
    case 'spider':   drawSpider(s,wa);           break;
    case 'enderman': drawEnderman(s,m.teEff||0); break;
    case 'blaze':    drawBlaze(s);               break;
  }
  ctx.filter='none'; ctx.shadowBlur=0; ctx.restore();
  if(player.frozenMons){
    ctx.save(); ctx.globalAlpha=0.35; ctx.fillStyle='#82D8FF';
    ctx.fillRect(sx-m.sz*1.1,sy-m.sz*(m.type==='enderman'?3.5:2.1),m.sz*2.2,m.sz*(m.type==='enderman'?4.5:3.2));
    ctx.globalAlpha=1; ctx.restore();
  }

  if(m.hp<m.maxHP){
    const bw=m.sz*2.4,bh=4,bx=sx-bw/2,by=sy-m.sz*(m.type==='enderman'?3.7:2.4)-8;
    ctx.fillStyle='rgba(0,0,0,.65)'; roundRect(ctx,bx-1,by-1,bw+2,bh+2,2); ctx.fill();
    const pct=m.hp/m.maxHP;
    ctx.fillStyle=pct>.5?'#00E676':pct>.25?'#FFD600':'#FF1744';
    roundRect(ctx,bx,by,Math.max(4,bw*pct),bh,2); ctx.fill();
  }
  if(m.isElite){
    const topY=sy-m.sz*(m.type==='enderman'?3.7:2.4)-22;
    ctx.textAlign='center'; ctx.font='13px serif';
    ctx.fillText('👑',sx,topY); ctx.textAlign='left';
  }
}

function drawPlayer(){
  const sx=canvas.width/2,sy=canvas.height/2;
  const t=Date.now()*.002;
  if(player.shield>0){
    ctx.save(); ctx.translate(sx,sy);
    const pct=player.shield/100;
    const r=34+Math.sin(t*3)*4;
    ctx.shadowColor='#42A5F5'; ctx.shadowBlur=24;
    ctx.strokeStyle=`rgba(66,165,245,${0.3+pct*0.5})`;
    ctx.lineWidth=3; ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.stroke();
    ctx.strokeStyle=`rgba(129,212,250,${0.5+pct*0.4})`;
    ctx.lineWidth=2; ctx.beginPath(); ctx.arc(0,0,r-5,0,Math.PI*2*pct); ctx.stroke();
    ctx.shadowBlur=0; ctx.restore();
  }
  ctx.save(); ctx.translate(sx,sy);
  if(player.facingLeft) ctx.scale(-1,1);
  if(player.invince>0&&Math.floor(Date.now()/80)%2===0) ctx.globalAlpha=.35;
  if(player.cloakActive>0){ctx.globalAlpha=0.35;ctx.shadowColor='#FFFFFF';ctx.shadowBlur=12;}
  const s=14,bob=Math.sin(player.walkF*.13)*2,lp=Math.sin(player.walkF*.13);
  ctx.fillStyle='rgba(0,0,0,.28)'; ctx.beginPath(); ctx.ellipse(0,s*1.65,s*.85,s*.28,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#1565C0'; ctx.fillRect(-s*.44,s*.3+bob,s*.37,s*.72+lp*5); ctx.fillRect(s*.07,s*.3+bob,s*.37,s*.72-lp*5);
  ctx.fillStyle='#1E88E5'; ctx.fillRect(-s*.56,-s*.72+bob,s*1.12,s*1.06);
  ctx.fillStyle='#1565C0'; ctx.fillRect(-s*.18,-s*.72+bob,s*.36,s*.3);
  ctx.fillRect(-s*.94,-s*.52+bob,s*.38,s*.26); ctx.fillRect(s*.56,-s*.52+bob,s*.38,s*.26);
  ctx.fillStyle='#FFCC80'; ctx.fillRect(-s*.44,-s*1.7+bob,s*.88,s*.95);
  ctx.fillStyle='#5D4037'; ctx.fillRect(-s*.44,-s*1.7+bob,s*.88,s*.28); ctx.fillRect(-s*.44,-s*1.42+bob,s*.14,s*.2);
  ctx.fillStyle='#37474F'; ctx.fillRect(-s*.28,-s*1.44+bob,s*.18,s*.18); ctx.fillRect(s*.1,-s*1.44+bob,s*.18,s*.18);
  ctx.fillStyle='#424242'; ctx.fillRect(s*.28,-s*.62+bob,s*.92,s*.22);
  ctx.fillStyle='#212121'; ctx.fillRect(s*.78,-s*.68+bob,s*.42,s*.34);
  ctx.globalAlpha=1; ctx.shadowBlur=0; ctx.restore();
}

// ── CROSSHAIR ────────────────────────────────────────────────────
function drawCrosshair(){
  const mx=mouse.x,my=mouse.y;
  const arm=13.65; // ~5% bigger than 13
  const gap=4.5;
  ctx.save();
  ctx.strokeStyle='#FF1A1A';
  ctx.lineWidth=1.5;
  ctx.shadowColor='#FF0000';
  ctx.shadowBlur=5;
  ctx.beginPath();
  // Horizontal
  ctx.moveTo(mx-arm,my); ctx.lineTo(mx-gap,my);
  ctx.moveTo(mx+gap,my); ctx.lineTo(mx+arm,my);
  // Vertical
  ctx.moveTo(mx,my-arm); ctx.lineTo(mx,my-gap);
  ctx.moveTo(mx,my+gap); ctx.lineTo(mx,my+arm);
  ctx.stroke();
  // Center dot
  ctx.fillStyle='#FF1A1A';
  ctx.beginPath(); ctx.arc(mx,my,1.8,0,Math.PI*2); ctx.fill();
  ctx.shadowBlur=0; ctx.restore();
}

function availTypes(){ return Object.entries(EDEFS).filter(([,d])=>d.unlock<=player.level).map(([k])=>k); }

function spawnMonster(forceType=null,forceElite=false){
  const types=availTypes();
  const tname=forceType||types[Math.floor(Math.random()*types.length)];
  const def=EDEFS[tname];
  const edge=Math.floor(Math.random()*4),mg=130;
  let mx,my;
  switch(edge){
    case 0:mx=player.x+(Math.random()-.5)*canvas.width;my=player.y-canvas.height/2-mg;break;
    case 1:mx=player.x+(Math.random()-.5)*canvas.width;my=player.y+canvas.height/2+mg;break;
    case 2:mx=player.x-canvas.width/2-mg;my=player.y+(Math.random()-.5)*canvas.height;break;
    default:mx=player.x+canvas.width/2+mg;my=player.y+(Math.random()-.5)*canvas.height;
  }
  const eliteChance=Math.min(0.12,0.05+waveN*0.007);
  const isElite=forceElite||(!def.isBoss&&Math.random()<eliteChance);
  if(isElite) sndElite();
  const d=DIFF[cfg.difficulty];
  const hpS=d.hpM*(1+player.level*.18+waveMult*.4)*(isElite?3.0:1);
  const dmgS=d.dmgM*(1+player.level*.12+waveMult*.2)*(isElite?1.6:1);
  const hp=def.hp*hpS;
  monsters.push({
    type:tname,x:mx,y:my,hp,maxHP:hp,
    spd:def.spd*(1+player.level*.025)*(isElite?1.25:1),
    dmg:def.dmg*dmgS,
    xp:def.xp*(1+player.level*.08)*(isElite?3:1),
    sz:def.sz*(isElite?1.2:1),
    hitR:def.hitR*(isElite?1.2:1),
    coinMin:isElite?def.coins[0]*5:def.coins[0],
    coinMax:isElite?def.coins[1]*5:def.coins[1],
    vx:0,vy:0,walkA:Math.random()*Math.PI*2,hitFlash:0,atkCool:0,
    // Enderman: much longer teleport cooldown (v5: max once per 5s, starting at 8-12s)
    shootT:800+Math.random()*1500,explT:null,tpCool:8000+Math.random()*4000,
    teEff:0,dead:false,isBoss:def.isBoss||false,isElite,
  });
}

function isMonsterVisible(m){
  const sx=m.x-cam.x, sy=m.y-cam.y;
  return sx>-60&&sx<canvas.width+60&&sy>-60&&sy<canvas.height+60;
}

function tickMonsters(dt){
  for(let i=monsters.length-1;i>=0;i--){
    const m=monsters[i];
    if(m.dead){monsters.splice(i,1);continue;}
    m.hitFlash=Math.max(0,m.hitFlash-dt*6);
    m.atkCool=Math.max(0,m.atkCool-dt*1000);
    m.walkA+=dt*m.spd*2.5;
    const dx=player.x-m.x,dy=player.y-m.y,dist=Math.hypot(dx,dy)||1;
    m.vx=dx/dist; m.vy=dy/dist;
    if(!player.frozenMons){
    switch(m.type){
      case 'zombie':
        if(dist>18){m.x+=m.vx*m.spd;m.y+=m.vy*m.spd;}
        else if(m.atkCool<=0){hitPlayer(m.dmg,m.x,m.y);m.atkCool=900;}
        break;
      case 'skeleton':{
        const pref=220;
        if(dist>pref+30){m.x+=m.vx*m.spd;m.y+=m.vy*m.spd;}
        else if(dist<pref-30){m.x-=m.vx*m.spd;m.y-=m.vy*m.spd;}
        m.shootT-=dt*1000;
        // Only shoot if within range AND visible on screen
        if(m.shootT<=0){
          m.shootT=1800+Math.random()*800;
          if(dist<520&&isMonsterVisible(m)) fireEB(m,false);
        }
        break;
      }
      case 'creeper':
        if(dist>28){m.x+=m.vx*m.spd;m.y+=m.vy*m.spd;}
        else if(m.explT===null)m.explT=1400;
        if(m.explT!==null){
          m.explT-=dt*1000;
          if(m.explT<=0){if(dist<90)hitPlayer(m.dmg,m.x,m.y);spawnExplo(m.x,m.y);sndExplo();m.dead=true;}
        }
        break;
      case 'spider':
        if(dist>16){m.x+=m.vx*m.spd;m.y+=m.vy*m.spd;}
        else if(m.atkCool<=0){hitPlayer(m.dmg,m.x,m.y);m.atkCool=600;}
        break;
      case 'enderman':
        if(dist>22){m.x+=m.vx*m.spd;m.y+=m.vy*m.spd;}
        else if(m.atkCool<=0){hitPlayer(m.dmg,m.x,m.y);m.atkCool=1200;}
        m.tpCool-=dt*1000;
        if(m.tpCool<=0){
          const a=Math.random()*Math.PI*2,r=80+Math.random()*140;
          m.x=player.x+Math.cos(a)*r; m.y=player.y+Math.sin(a)*r;
          // Minimum 5 seconds between teleports (5000-9000ms)
          m.tpCool=5000+Math.random()*4000; m.teEff=1;
        }
        if(m.teEff>0)m.teEff-=dt*2;
        break;
      case 'blaze':{
        const bpref=260;
        if(dist>bpref+20){m.x+=m.vx*m.spd;m.y+=m.vy*m.spd;}
        else if(dist<bpref-20){m.x-=m.vx*m.spd;m.y-=m.vy*m.spd;}
        m.shootT-=dt*1000;
        // Only shoot if within range AND visible on screen
        if(m.shootT<=0){
          m.shootT=1200+Math.random()*600;
          if(dist<640&&isMonsterVisible(m)) fireEB(m,true);
        }
        break;
      }
    }
    } // end !frozenMons
    if(Math.hypot(m.x-player.x,m.y-player.y)>2200)m.dead=true;
  }
}
function fireEB(m,fb){
  // Performance: cap enemy bullets
  if(eBullets.length>=20)return;
  const dx=player.x-m.x,dy=player.y-m.y,d=Math.hypot(dx,dy)||1;
  eBullets.push({x:m.x,y:m.y,vx:(dx/d)*(fb?4.5:5.5),vy:(dy/d)*(fb?4.5:5.5),dmg:m.dmg,fireball:fb,sz:fb?10:6,life:2.5});
}
function hitPlayer(rawDmg){
  if(hurtCool>0||player.invince>0)return;
  const actual=rawDmg*(1-player.defense)*(.8+Math.random()*.4);
  if(player.shield>0){
    const absorbed=Math.min(player.shield,actual);
    player.shield-=absorbed;
    const remaining=actual-absorbed;
    if(remaining>0)player.hp=Math.max(0,player.hp-remaining);
  } else {
    player.hp=Math.max(0,player.hp-actual);
  }
  hurtCool=600;player.invince=500;hurtFlash=.5;
  if(cfg.screenShake){cam.shake=350;cam.shakeA=7;}
  sndHurt(); spawnParts(player.x,player.y,'#EF5350',6,2);
  spawnDmgNum(player.x,player.y-20,actual,'#FF5252');
  if(player.hp<=0)endGame();
}

function pickUpgradeCard(){
  const rar=rollRarity();
  let pool=UPGRADES.filter(u=>{
    if(u.rarity!==rar)return false;
    if(rar!=='legendary')return true;
    // Ring upgrades only if player has the Damage Ring
    if(u.id==='ring_mult'||u.id==='ring_area') return player.hasDamageRing;
    // Damage Ring only available if: player has another legendary but not the ring yet
    if(u.id==='dmgring') return player.hasLegendary && !player.hasDamageRing;
    // Other legendaries: only if no legendary obtained yet
    return !player.hasLegendary;
  });
  if(pool.length===0){
    // Fallback to epic
    pool=UPGRADES.filter(u=>u.rarity==='epic');
  }
  if(pool.length===0) pool=UPGRADES.filter(u=>u.rarity==='common');
  return pool[Math.floor(Math.random()*pool.length)];
}

function openUpgrade(){
  state=S.UPGRADE; sndLevel();
  const chosen=new Set(); upgOpts=[];
  let attempts=0;
  while(upgOpts.length<3&&attempts<40){
    attempts++;
    const card=pickUpgradeCard();
    if(!chosen.has(card.id)){chosen.add(card.id);upgOpts.push(card);}
  }
  if(upgOpts.some(u=>u.rarity==='legendary')) sndLegendary();
  upgSel=0;
}

function pickUpgrade(idx){
  if(!upgOpts[idx])return;
  const u=upgOpts[idx];
  u.apply(player);
  player.upgrades.push(u.id);
  // Track legendary ownership
  if(u.rarity==='legendary'){
    player.hasLegendary=true;
    if(u.id==='dmgring') player.hasDamageRing=true;
  }
  state=S.PLAYING;
}

function tickBurst(dt){
  if(!player.burstMode)return;
  if(player.burstCount>0){
    player.burstTimer-=dt*1000;
    if(player.burstTimer<=0){
      mkBullet(shootAngle,0);
      player.burstCount--;
      player.burstTimer=80;
    }
  }
}

function killMonster(idx){
  const m=monsters[idx]; m.dead=true;
  player.xp+=m.xp; player.kills++;
  const mult=1+combo*.08;
  player.score+=Math.floor(m.xp*mult);
  combo++; comboT=3.5;
  if(player.vamp>0)player.hp=Math.min(player.maxHP,player.hp+player.vamp);
  const d=DIFF[cfg.difficulty];
  const coinAmt=Math.floor((m.coinMin+Math.random()*(m.coinMax-m.coinMin))*d.coinM);
  spawnCoin(m.x,m.y,coinAmt);
  if(m.isElite){ spawnGold(m.x,m.y); spawnEliteBoost(m.x,m.y); }
  if(m.isBoss&&Math.random()<0.01){
    earnCoins(1000); player.sessionCoins=(player.sessionCoins||0)+1000;
    spawnGold(m.x,m.y); waveMsg={text:'🪙  JACKPOT!  +1000 COINS',life:3}; sndElite();
  }
  trySpawnPickup(m.x,m.y); checkHi();
  if(player.xp>=player.xpNext){
    player.xp-=player.xpNext; player.xpNext=Math.floor(player.xpNext*1.28);
    player.level++;
    openUpgrade(); writeSave(curSlot>=0?curSlot:0); if(curSlot<0)curSlot=0;
  }
}
function endGame(){state=S.GAMEOVER;sndDie();checkHi();if(curSlot>=0)delSave(curSlot);}

function shoot(){
  const now=Date.now();
  if(now-player.lastShot<player.fireRate)return;
  player.lastShot=now;
  if(player.burstMode&&player.burstCount===0){
    player.burstCount=2; player.burstTimer=80;
    mkBullet(shootAngle,0);
  } else if(player.spread===1){
    mkBullet(shootAngle,0);
  } else {
    for(let i=0;i<player.spread;i++)mkBullet(shootAngle,(i-(player.spread-1)/2)*.22);
  }
}
function mkBullet(ang,off){
  bullets.push({x:player.x,y:player.y,vx:Math.cos(ang+off)*player.bSpeed,vy:Math.sin(ang+off)*player.bSpeed,dmg:player.dmg,life:1,pierceLeft:player.pierce,explosive:player.explosive,hits:new Set(),trail:[]});
}
function tickBullets(dt){
  for(let i=bullets.length-1;i>=0;i--){
    const b=bullets[i];
    b.trail.push({x:b.x,y:b.y}); if(b.trail.length>3)b.trail.shift(); // Perf: trail length 3
    b.x+=b.vx; b.y+=b.vy; b.life-=dt*.85;
    if(b.life<=0){bullets.splice(i,1);continue;}
    let gone=false;
    for(let j=monsters.length-1;j>=0;j--){
      const m=monsters[j];
      if(b.hits.has(j)||m.dead)continue;
      const hitY=m.type==='enderman'?m.y-m.sz*1.5:m.y;
      if(Math.hypot(b.x-m.x,b.y-hitY)<m.hitR){
        m.hp-=b.dmg; m.hitFlash=1; b.hits.add(j);
        sndHit(); spawnBlood(m.x,m.y);
        spawnDmgNum(m.x,m.y-m.sz,b.dmg,m.isElite?'#FFD700':'#FFF176');
        if(b.explosive){spawnExplo(b.x,b.y);monsters.forEach((mm,mi)=>{if(mi!==j&&!mm.dead&&Math.hypot(mm.x-b.x,mm.y-b.y)<70){mm.hp-=b.dmg*.55;mm.hitFlash=.8;}});}
        if(m.hp<=0&&!m.dead)killMonster(j);
        if(b.pierceLeft<=0){gone=true;break;}else b.pierceLeft--;
      }
    }
    if(gone)bullets.splice(i,1);
  }
  for(let i=eBullets.length-1;i>=0;i--){
    const b=eBullets[i]; b.x+=b.vx; b.y+=b.vy; b.life-=dt*.55;
    if(b.life<=0){eBullets.splice(i,1);continue;}
    if(Math.hypot(b.x-player.x,b.y-player.y)<15){hitPlayer(b.dmg);if(b.fireball)spawnExplo(b.x,b.y);eBullets.splice(i,1);}
  }
}
function drawBullets(){
  bullets.forEach(b=>{
    b.trail.forEach((t,idx)=>{
      ctx.globalAlpha=(idx/b.trail.length)*.35; ctx.fillStyle=b.explosive?'#FF6D00':'#FFF59D';
      const ts=2+idx; ctx.fillRect(t.x-cam.x-ts/2,t.y-cam.y-ts/2,ts,ts);
    }); ctx.globalAlpha=1;
    ctx.shadowColor=b.explosive?'#FF6D00':'#FFF176'; ctx.shadowBlur=10;
    ctx.fillStyle=b.explosive?'#FF9800':'#FFEB3B';
    ctx.beginPath(); ctx.arc(b.x-cam.x,b.y-cam.y,b.explosive?6:4,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
  });
  eBullets.forEach(b=>{
    const sx=b.x-cam.x,sy=b.y-cam.y;
    if(sx<-20||sx>canvas.width+20||sy<-20||sy>canvas.height+20)return;
    ctx.fillStyle=b.fireball?'#FF9800':'#CFD8DC';
    ctx.beginPath(); ctx.arc(sx,sy,b.sz/2,0,Math.PI*2); ctx.fill();
  });
}

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();
}
function glassPanel(x,y,w,h,r=8,sel=false,ac='#00D4FF'){
  ctx.fillStyle=sel?'rgba(0,212,255,0.08)':'rgba(5,9,20,0.90)';
  roundRect(ctx,x,y,w,h,r);ctx.fill();
  const grd=ctx.createLinearGradient(x,y,x,y+h*.45);
  grd.addColorStop(0,'rgba(255,255,255,0.06)');grd.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=grd;roundRect(ctx,x,y,w,h,r);ctx.fill();
  ctx.strokeStyle=sel?ac:'rgba(255,255,255,0.1)';ctx.lineWidth=sel?1.5:1;
  roundRect(ctx,x,y,w,h,r);ctx.stroke();
  if(sel){ctx.shadowColor=ac;ctx.shadowBlur=16;roundRect(ctx,x,y,w,h,r);ctx.stroke();ctx.shadowBlur=0;}
}
function gradBar(x,y,w,h,pct,c1,c2,r=3){
  ctx.fillStyle='rgba(255,255,255,0.06)';roundRect(ctx,x,y,w,h,r);ctx.fill();
  if(pct>0){
    const g=ctx.createLinearGradient(x,0,x+w,0);
    g.addColorStop(0,c1);g.addColorStop(1,c2);
    ctx.fillStyle=g;roundRect(ctx,x,y,Math.max(r*2,w*Math.min(1,pct)),h,r);ctx.fill();
    const sh=ctx.createLinearGradient(x,y,x,y+h*.5);
    sh.addColorStop(0,'rgba(255,255,255,0.2)');sh.addColorStop(1,'rgba(255,255,255,0)');
    ctx.fillStyle=sh;roundRect(ctx,x,y,Math.max(r*2,w*Math.min(1,pct)),h/2,r);ctx.fill();
  }
  ctx.strokeStyle='rgba(255,255,255,0.08)';ctx.lineWidth=1;roundRect(ctx,x,y,w,h,r);ctx.stroke();
}
function txt(str,x,y,col='#8899AA',size=7,align='left',font='"Press Start 2P"'){
  ctx.fillStyle=col;ctx.font=`${size}px ${font}`;ctx.textAlign=align;ctx.fillText(str,x,y);ctx.textAlign='left';
}
function wrapText(ctx,text,cx,y,maxW,lineH){
  const words=text.split(' ');let line='';
  words.forEach(w=>{const t=line+w+' ';if(ctx.measureText(t).width>maxW){ctx.fillText(line.trim(),cx,y);line=w+' ';y+=lineH;}else line=t;});
  ctx.fillText(line.trim(),cx,y);
}
function drawScreenBG(t){
  ctx.fillStyle='#060B16';ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.strokeStyle='rgba(0,212,255,0.03)';ctx.lineWidth=1;
  const gs=64;
  for(let x=0;x<canvas.width;x+=gs){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,canvas.height);ctx.stroke();}
  for(let y=0;y<canvas.height;y+=gs){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(canvas.width,y);ctx.stroke();}
  for(let i=0;i<55;i++){
    const sx=((i*2537+1231)%canvas.width),sy=((i*3761+457)%canvas.height);
    ctx.fillStyle=`rgba(255,255,255,${.15+Math.sin(t*.8+i)*.15})`;ctx.fillRect(sx,sy,1,1);
  }
}
function Min(a,b){return a<b?a:b;}

  ctx.fillStyle='#F5B800';ctx.font='9px "Press Start 2P"';ctx.fillText(`🪙 ${gCoins}  COINS`,W/2,104);

  const tabW=160,tabH=32,tabY=122,tabGap=12;

  const tabs=['WEAPON SHOP','SPECIAL'];

    ctx.fillStyle=sel?'#00D4FF':'#506070';
    ctx.font=`${sel?9:8}px "Press Start 2P"`;

  if(shopTab===0){
    const cols=3,gapX=12,gapY=12;

      const col=i%cols,row=Math.floor(i/cols);

      ctx.font='28px serif';ctx.textAlign='center';ctx.fillText(item.icon,cx,iy+40);
      ctx.fillStyle=sel?ac:'#C8DCE8';
      const nfs=Math.min(8,120/item.name.length);ctx.font=`${nfs}px "Press Start 2P"`;
      ctx.fillText(item.name,cx,iy+64);
      ctx.fillStyle=sel?'#B0CDD8':'#7A9EAC';ctx.font='7px "Press Start 2P"';ctx.textAlign='center';
      wrapText(ctx,item.desc,cx,iy+82,iw-16,13);
      const dotR=4.5,dotsW=item.maxLvl*(dotR*2+4);

        const dx2=cx-dotsW/2+d*(dotR*2+4)+dotR;

      ctx.fillStyle=ac;ctx.font='7px "Press Start 2P"';ctx.textAlign='center';

// ═══════════════════════════════════════════════════════════════
//  UPDATE LOOP
// ═══════════════════════════════════════════════════════════════
function update(dt){
  if(state!==S.PLAYING)return;
  hurtCool=Math.max(0,hurtCool-dt*1000);
  player.invince=Math.max(0,player.invince-dt*1000);
  if(comboT>0){comboT-=dt;if(comboT<=0)combo=0;}
  if(player.regen>0)player.hp=Math.min(player.maxHP,player.hp+player.regen);
  tickPlayerTimers(dt);
  tickAura(dt);
  tickDmgRing(dt);
  tickRocket(dt);
  tickRockets(dt);
  tickCloak(dt);
  tickGauntlet(dt);
  tickBurst(dt);

  let dx=0,dy=0;
  if(keys['KeyW']||keys['ArrowUp'])    dy-=1;
  if(keys['KeyS']||keys['ArrowDown'])  dy+=1;
  if(keys['KeyA']||keys['ArrowLeft'])  dx-=1;
  if(keys['KeyD']||keys['ArrowRight']) dx+=1;
  if(dx||dy){
    const len=Math.hypot(dx,dy)||1;
    player.x+=(dx/len)*player.speed;player.y+=(dy/len)*player.speed;
    player.walkF++;
    if(dx!==0)player.facingLeft=dx<0;
  }
  if(mouse.down)shoot();
  cam.x=player.x-canvas.width/2;cam.y=player.y-canvas.height/2;
  if(cam.shake>0){cam.shake-=dt*1000;cam.shakeA*=.9;}

  // ── Wave timer (45s per wave) ─────────────────────────────────
  waveTimer-=dt;
  if(waveTimer<=0){
    waveN++;
    waveTimer=45;
    updateWaveParams();
    if(waveN>=6&&Math.random()<0.4){
      spawnMonster('blaze');
      waveMsg={text:'⚠  BLAZE INCOMING!',life:2.5};
    }else{
      waveMsg={text:`⚡  WAVE ${waveN}  INCOMING!`,life:2.5};
    }
  }

  // ── Spawn timer ───────────────────────────────────────────────
  spawnTimer-=dt*1000;
  if(spawnTimer<=0&&monsters.length<maxMons){
    spawnMonster();
    spawnTimer=spawnRate;
  }

  tickMonsters(dt);tickBullets(dt);tickParts(dt);
  tickPickups();tickBoostPickups(dt);tickCoins(dt);tickDmgNums(dt);
}

// ═══════════════════════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════════════════════
function render(){
  ctx.save();
  if(cam.shake>0)ctx.translate((Math.random()-.5)*cam.shakeA,(Math.random()-.5)*cam.shakeA);
  ctx.fillStyle='#0A0E18';ctx.fillRect(0,0,canvas.width,canvas.height);
  switch(state){
    case S.MENU:     drawMenu();    break;
    case S.LOAD:     drawLoad();    break;
    case S.SHOP:     drawShop();    break;
    case S.OPTIONS:  drawOptions(); break;
    case S.UPDATES:  drawUpdates(); break;
    case S.GAMEOVER: drawGameOver();break;
    case S.PLAYING:case S.PAUSED:case S.UPGRADE:case S.SAVESLOT:
      drawBG(); drawPickups(); drawWorldCoins(); drawBoostPickups();
      monsters.forEach(m=>{const sx=m.x-cam.x,sy=m.y-cam.y;if(sx>-150&&sx<canvas.width+150&&sy>-150&&sy<canvas.height+150)drawMonster(m,sx,sy);});
      drawBullets(); drawAura(); drawDmgRing(); drawRockets(); drawPlayer(); drawParts(); drawDmgNums();
      drawHUD(); drawMinimap();
      if(state===S.PAUSED)   drawPause();
      if(state===S.SAVESLOT) drawSaveSlot();
      if(state===S.UPGRADE)  drawUpgrade();
      break;
  }
  // Custom red crosshair — drawn last, always on top
  drawCrosshair();
  ctx.restore();
}

// ═══════════════════════════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════════════════════════
let lastT=0;
function loop(ts){const dt=Math.min((ts-lastT)/1000,.05);lastT=ts;update(dt);render();requestAnimationFrame(loop);}
loadCfg();loadAllSaves();loadShop();
requestAnimationFrame(ts=>{lastT=ts;requestAnimationFrame(loop);});
</script>
